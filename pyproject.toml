[tool.poetry]
name = "maternity-services-statistics-to-cml"
version = "0.1.0"
description = ""
authors = ["Data Science Skilled team <datascience@nhs.net>"]
readme = "README.md"
packages = [{include = "msds-monthly-to-cml", from = "src"}]

[tool.poetry.dependencies]
python = ">=3.10, <4"
pyspark = ">=3.5.0"
pyyaml = ">=6.0.3"
cml-conversion-helpers = {version = "^0.1.0", source = "test-pypi"}
cml-schemas = "^0.1.2"

[tool.poetry.group.dev.dependencies]
pytest = ">=8.0"
pytest-html = ">=3.1.1"


[[tool.poetry.source]]
name = "test-pypi"
url = "https://test.pypi.org/simple/"
priority = "explicit"


[[tool.poetry.source]]
name = "testpypi"
url = "https://test.pypi.org/simple/"
priority = "explicit"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
